schema_version = 1
rendering_target = "1080p"
audience = "groundwater researchers, practitioners, and technically curious collaborators"
viewing_conditions = ["desktop", "projection", "phone"]
visual_character = ["rigorous", "calm", "field-grounded"]
design_read = "A field-grounded explanation for groundwater specialists and non-specialist collaborators, using one dominant scientific object per frame, restrained motion, and typography that remains legible on phones and projected displays."
design_variance = 4
motion_intensity = 5
visual_density = 4
forbidden_defaults = ["decorative_particles", "card_grid", "unmotivated_glow", "unmotivated_bounce"]

[reference]
kind = "generated"
locator = "local Manim style-frame study derived from the Lin and Yeh (2017) scientific objects"
external_access_authorized = false

[typography]
font_family = "Arial"
math_font = "Latin Modern Math"
title_px = 44
body_px = 30
math_px = 38
annotation_px = 24
minimum_downsampled_px = 18

[color_roles]
background = "#F6F8F5"
foreground = "#112D32"
focal = "#087F8C"
secondary = "#566D70"
warning = "#B64A35"
uncertainty = "#B77A1F"

[stroke_widths]
grid = 1.0
secondary = 2.0
primary = 4.0
focus = 6.0

[spacing]
frame_margin = 0.45
caption_band = 1.0
formula_lane = 1.25
minimum_gap = 0.10

[motion]
runtime = "manim"
gsap_role = "concept-only"
allowed_classes = ["trace", "reveal", "same-object-transform", "camera-bridge", "fade-replace", "hold"]
default_duration = 0.9
revelation_pause = 1.5
formula_pause = 1.6
view_change_pause = 1.3

