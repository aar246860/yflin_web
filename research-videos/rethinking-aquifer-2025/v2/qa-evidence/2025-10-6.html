<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rethinking Aquifer Characterization</title>
  <style>
    :root { color-scheme: light; --bg: #e8efeb; --surface: #f6f8f5; --text: #112d32; --muted: #566d70; --line: #9fc8c3; --accent: #087f8c; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--text); font-family: Arial, "Noto Sans TC", "Microsoft JhengHei", sans-serif; display: grid; place-items: center; padding: 32px; }
    main { width: min(1080px, 100%); padding: clamp(18px, 4vw, 44px); background: var(--surface); border: 1px solid var(--line); }
    h1 { margin: 0 0 10px; font-size: clamp(24px, 3vw, 40px); letter-spacing: 0; }
    p { margin: 0 0 18px; color: var(--muted); line-height: 1.7; }
    video { display: block; width: 100%; aspect-ratio: 16 / 9; background: #112d32; border: 1px solid var(--line); }
    button { margin-top: 12px; padding: 8px 14px; color: #f6f8f5; background: var(--accent); border: 1px solid var(--accent); cursor: pointer; }
    .actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; }
    a { color: var(--accent); text-decoration: none; border-bottom: 1px solid color-mix(in srgb, var(--accent), transparent 45%); }
  </style>
</head>
<body>
  <main>
    <h1>Rethinking Aquifer Characterization</h1>
    <p>A geometry-first visual explanation of lag diagnostics, penalized model comparison, and conditional spatial interpretation in pumping-test aquifer characterization.</p>
    <video id="research-video" controls preload="metadata" playsinline poster="2025-10-6_poster.png">
      <source src="2025-10-6.mp4" type="video/mp4">
      <track kind="captions" src="2025-10-6_en.vtt" srclang="en" label="English">
      Your browser cannot play this MP4 file.
    </video>
    <div class="actions">
      <a href="2025-10-6.mp4">Open MP4 directly</a>
      <a href="2025-10-6_en.vtt">English captions</a>
      <a href="2025-10-6_contact_sheet.png">Open preview sheet</a>
    </div>
    <button type="button" id="play-video">Play video</button>
  </main>
  <script>
    document.getElementById("play-video").addEventListener("click", () => {
      document.getElementById("research-video").play();
    });
  </script>
</body>
</html>
