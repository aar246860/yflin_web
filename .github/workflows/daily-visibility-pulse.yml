name: Daily visibility pulse

on:
  schedule:
    - cron: "7 0 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  daily-pulse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run daily deployed-site visibility pulse
        env:
          VISIBILITY_CONFIG_PATH: .github/visibility/visibility.config.json
          LIVE_SITE_URL: https://aar246860.github.io/yflin_web/
          EXPECTED_GA_MEASUREMENT_ID: G-0JHBH3R12D
        run: node .github/visibility/daily_pulse.mjs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-visibility-pulse-report
          path: |
            reports/visibility/daily/
            reports/visibility/latest-daily-pulse.md
            reports/visibility/latest-daily-pulse.json
      - name: Update daily visibility pulse issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const summaryPath = "reports/visibility/latest-daily-pulse.json";
            const summary = fs.existsSync(summaryPath)
              ? JSON.parse(fs.readFileSync(summaryPath, "utf8"))
              : {};
            const title = "Daily visibility pulse monitor";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `Daily visibility pulse for the deployed Lagging Theory website.`,
              ``,
              `- Date: ${summary.reportDate || "unknown"}`,
              `- Status: ${summary.status || "unknown"}`,
              `- Run: ${runUrl}`,
              `- Artifact: ${summary.artifactName || "daily-visibility-pulse-report"}`,
              `- Live site: ${summary.liveSiteUrl || "https://aar246860.github.io/yflin_web"}`,
              `- Checked URLs: ${summary.checkedUrls ?? "unknown"}`,
              `- Blockers: ${summary.blockers ?? "unknown"}`,
              `- Warnings: ${summary.warnings ?? "unknown"}`,
              `- Expected GA4 ID: ${summary.expectedGaId || "unknown"}`,
              ``,
              `Top blockers:`,
              ...((summary.topBlockers || []).length
                ? summary.topBlockers.map((item, index) => `${index + 1}. ${item}`)
                : [`- None`]),
              ``,
              `Top warnings:`,
              ...((summary.topWarnings || []).length
                ? summary.topWarnings.map((item, index) => `${index + 1}. ${item}`)
                : [`- None`]),
              ``,
              `This monitor does not edit public copy. It only checks whether the deployed site remains measurable, crawlable, and answerable.`,
              ``,
              `Next action: if status is attention, ask Codex to inspect the daily pulse artifact. Otherwise, use the weekly visibility report for strategy decisions.`
            ].join("\n");

            const query = `repo:${context.repo.owner}/${context.repo.repo} is:issue in:title "${title}"`;
            const existing = await github.rest.search.issuesAndPullRequests({ q: query, per_page: 1 });
            const issue = existing.data.items.find((item) => item.title === title);

            if (issue) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body,
              });
              core.info(`Updated daily pulse issue #${issue.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
              core.info(`Created daily pulse issue #${created.data.number}`);
            }
