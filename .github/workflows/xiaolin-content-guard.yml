name: Xiaolin publication guard

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/content/xiaolin/**"
      - "public/images/xiaolin/**"
      - "src/data/xiaolinStatus.json"
      - "docs/xiaolin-worker-contract.md"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Validate Xiaolin content boundaries
        run: npm run xiaolin:check
      - name: Build the complete site
        run: npm run build
