name: Weekly content build

on:
  schedule:
    - cron: "17 21 * * 5"
  workflow_dispatch:

jobs:
  build-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: weekly-static-site-preview
          path: dist
