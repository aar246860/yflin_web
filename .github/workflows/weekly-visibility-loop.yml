name: Weekly deployed visibility loop

on:
  schedule:
    - cron: "23 21 * * 5"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  visibility-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Generate deployed-site visibility report
        env:
          VISIBILITY_DIST_DIR: .
          VISIBILITY_CONFIG_PATH: .github/visibility/visibility.config.json
          GSC_ACCESS_TOKEN: ${{ secrets.GSC_ACCESS_TOKEN }}
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          OPENALEX_MAILTO: ${{ secrets.OPENALEX_MAILTO }}
          CROSSREF_MAILTO: ${{ secrets.CROSSREF_MAILTO }}
        run: node .github/visibility/visibility_report.mjs
      - name: Prepare IndexNow payload
        env:
          VISIBILITY_DIST_DIR: .
          INDEXNOW_HOST: aar246860.github.io
        run: node .github/visibility/submit_indexnow.mjs --dry-run
      - name: Submit IndexNow when configured
        env:
          VISIBILITY_DIST_DIR: .
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          INDEXNOW_HOST: aar246860.github.io
        run: node .github/visibility/submit_indexnow.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: weekly-lagging-theory-visibility-report
          path: reports/visibility/
      - name: Create weekly reminder issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const summaryPath = "reports/visibility/latest-summary.json";
            const summary = fs.existsSync(summaryPath)
              ? JSON.parse(fs.readFileSync(summaryPath, "utf8"))
              : {};
            const date = summary.reportDate || new Intl.DateTimeFormat("en-CA", {
              timeZone: "Asia/Taipei",
              year: "numeric",
              month: "2-digit",
              day: "2-digit"
            }).format(new Date());
            const title = `Visibility report ready - ${date}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `The weekly Lagging Theory visibility report is ready.`,
              ``,
              `- Run: ${runUrl}`,
              `- Artifact: ${summary.artifactName || "weekly-lagging-theory-visibility-report"}`,
              `- Recommendations: ${summary.recommendations ?? "unknown"}`,
              `- Technical blockers: ${summary.technicalBlockers ?? "unknown"}`,
              `- Technical warnings: ${summary.technicalWarnings ?? "unknown"}`,
              `- Google Search Console: ${summary.gscStatus || "unknown"}`,
              `- Crossref: ${summary.crossrefStatus || "unknown"}`,
              `- OpenAlex: ${summary.openAlexStatus || "unknown"}`,
              ``,
              `This issue is only a reminder. The full strategy report stays in the workflow artifact.`,
              ``,
              `Next action: ask Codex to summarize the latest visibility report.`
            ].join("\n");

            const query = `repo:${context.repo.owner}/${context.repo.repo} is:issue in:title "${title}"`;
            const existing = await github.rest.search.issuesAndPullRequests({ q: query, per_page: 1 });
            const issue = existing.data.items.find((item) => item.title === title);

            if (issue) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body
              });
              core.info(`Updated reminder issue #${issue.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body
              });
              core.info(`Created reminder issue #${created.data.number}`);
            }
