name: Weekly deployed visibility loop

on:
  schedule:
    - cron: "23 21 * * 5"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  visibility-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Generate deployed-site visibility report
        env:
          VISIBILITY_DIST_DIR: .
          VISIBILITY_CONFIG_PATH: .github/visibility/visibility.config.json
          GSC_ACCESS_TOKEN: ${{ secrets.GSC_ACCESS_TOKEN }}
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          OPENALEX_MAILTO: ${{ secrets.OPENALEX_MAILTO }}
          CROSSREF_MAILTO: ${{ secrets.CROSSREF_MAILTO }}
        run: node .github/visibility/visibility_report.mjs
      - name: Prepare IndexNow payload
        env:
          VISIBILITY_DIST_DIR: .
          INDEXNOW_HOST: aar246860.github.io
        run: node .github/visibility/submit_indexnow.mjs --dry-run
      - name: Submit IndexNow when configured
        env:
          VISIBILITY_DIST_DIR: .
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          INDEXNOW_HOST: aar246860.github.io
        run: node .github/visibility/submit_indexnow.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: weekly-lagging-theory-visibility-report
          path: reports/visibility/
