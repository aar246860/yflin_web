name: Xiaolin safe note publisher

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 5"

permissions:
  contents: write

jobs:
  promote-safe-note:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install FFmpeg for research-video verification
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: npm ci
      - name: Promote at most one safe Xiaolin note
        env:
          XIAOLIN_PUBLISH_ENABLED: ${{ vars.XIAOLIN_PUBLISH_ENABLED || 'true' }}
        run: node scripts/xiaolin-publisher.mjs --promote
      - name: Build before publishing
        run: npm run build
      - name: Commit and push only if a note was promoted
        shell: bash
        run: |
          if git diff --quiet -- src/content/xiaolin; then
            echo "No safe Xiaolin note to publish."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/xiaolin
          git commit -m "Publish safe Xiaolin note"
          git push origin main
