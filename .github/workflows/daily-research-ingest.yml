name: Daily research ingest report

on:
  schedule:
    - cron: "37 20 * * *"
  workflow_dispatch:

jobs:
  report-only:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run content:sync
      - run: npm run content:report
      - uses: actions/upload-artifact@v4
        with:
          name: daily-research-content-report
          path: reports/content_report_2026-06-12.md
