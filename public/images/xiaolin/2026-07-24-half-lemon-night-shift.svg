      <stop offset="0" stop-color="#17384c"/>
      <stop offset="1" stop-color="#3a6872"/>
    </linearGradient>
    <linearGradient id="coldLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffbe9"/>
      <stop offset="1" stop-color="#d7f0e8"/>
    </linearGradient>
    <filter id="paperShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#16323a" flood-opacity=".22"/>
    </filter>
  </defs>

